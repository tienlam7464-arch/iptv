<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family 4K TV Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        body { margin: 0; background: #0b0b0b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .video-container { flex: 3; background: black; display: flex; align-items: center; justify-content: center; position: relative; }
        #player { width: 100%; height: 100%; }
        .sidebar { flex: 1; background: #141414; overflow-y: auto; padding: 20px; border-left: 2px solid #222; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        h3 { text-align: center; margin-top: 0; color: #00ff88; letter-spacing: 1px; font-size: 22px; border-bottom: 2px solid #222; padding-bottom: 15px; }
        .channel-btn { display: block; width: 100%; padding: 16px; margin: 12px 0; background: #1f1f1f; color: #e0e0e0; border: 1px solid #333; text-align: left; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: all 0.2s ease; }
        .channel-btn:hover { background: #00ff88; color: black; font-weight: bold; transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,255,136,0.3); border-color: #00ff88; }
        .channel-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="sidebar">
        <h3>🏠 Family Channel Guide</h3>
        
        <button class="channel-btn" onclick="changeChannel('PASTE_FIRST_CHANNEL_URL_HERE')">📺 4K Sports 1</button>
        <button class="channel-btn" onclick="changeChannel('PASTE_SECOND_CHANNEL_URL_HERE')">📺 Premium Movies</button>
        <button class="channel-btn" onclick="changeChannel('PASTE_THIRD_CHANNEL_URL_HERE')">📺 Documentaries</button>
    </div>

    <script>
        // Initialize the player with the first channel as default
        var player = new Clappr.Player({
            source: "PASTE_FIRST_CHANNEL_URL_HERE",
            parentId: "#player",
            width: '100%',
            height: '100%',
            autoPlay: true,
            mute: false
        });

        function changeChannel(url) {
            player.load(url);
            player.play();
        }
    </script>
</body>
</html>
